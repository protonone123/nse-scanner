name: NSE Live Scanner v5.0

on:
  schedule:
    # ── SINGLE DAILY RUN (post-close, after bhavcopy upload) ─────────────────
    # NSE bhavcopy uploads ~6:00–6:30 PM IST. Run at 7:00 PM IST to be safe.
    # GitHub Actions cron is UTC. IST = UTC+5:30.
    # 7:00 PM IST = 13:30 UTC. Runs Mon–Fri.
    - cron: "30 13 * * 1-5"

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        type: choice
        options: [daily, test, healthcheck, bootstrap]

permissions:
  contents: write

# ════════════════════════════════════════════════════════════════════
# DAILY — EOD update all 2139 stocks, full pattern scan, commit watchlist
# ════════════════════════════════════════════════════════════════════
jobs:

  daily:
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily')

    runs-on: ubuntu-latest
    timeout-minutes: 45   # bhavcopy+resample ~1min, scan ~10min, plenty of headroom

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      # week step MUST precede cache restore
      - name: Get week number
        id: week
        run: echo "week=$(date -u +%V)" >> $GITHUB_OUTPUT

      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: price_cache.db
          key: price-cache-${{ runner.os }}-w${{ steps.week.outputs.week }}
          restore-keys: |
            price-cache-${{ runner.os }}-

      - name: Restore signals DB
        uses: actions/cache@v4
        with:
          path: signals.db
          key: signals-db-${{ runner.os }}-w${{ steps.week.outputs.week }}
          restore-keys: |
            signals-db-${{ runner.os }}-

      - name: EOD update via bhavcopy (1 HTTP call — all stocks)
        # Downloads NSE sec_bhavdata_full CSV → writes 1d bars → resamples 1wk+1mo
        # Falls back to yfinance batch automatically if NSE servers are down
        run: python data_updater.py --daily

      - name: Sector update
        run: python data_updater.py --sectors || true

      - name: Run daily scan
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scanner.py --daily --telegram

      - name: Track signal outcomes
        run: python scanner.py --outcomes || true

      - name: Save price cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: price_cache.db
          key: price-cache-${{ runner.os }}-w${{ steps.week.outputs.week }}-${{ github.run_number }}

      - name: Save signals DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: signals.db
          key: signals-db-${{ runner.os }}-w${{ steps.week.outputs.week }}-${{ github.run_number }}

      - name: Commit watchlist
        if: always()
        run: |
          git config user.name "NSE Scanner Bot"
          git config user.email "scanner@noreply.github.com"
          git add watchlist.json || true
          git diff --staged --quiet || \
            git commit -m "watchlist: $(date -u '+%Y-%m-%d %H:%M') [daily]"
          git push || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-${{ github.run_number }}
          path: |
            output/
            logs/
            signals.db
            watchlist.json
          retention-days: 30
          if-no-files-found: warn


  # ════════════════════════════════════════════════════════════════════
  # TEST — 100 stocks, sends Telegram so you can verify output
  # ════════════════════════════════════════════════════════════════════

  test:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test'

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Get week number
        id: week
        run: echo "week=$(date -u +%V)" >> $GITHUB_OUTPUT

      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: price_cache.db
          key: price-cache-${{ runner.os }}-w${{ steps.week.outputs.week }}
          restore-keys: |
            price-cache-${{ runner.os }}-

      - name: Run test scan (100 stocks + Telegram)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scanner.py --test --telegram

      - name: Save price cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: price_cache.db
          key: price-cache-${{ runner.os }}-w${{ steps.week.outputs.week }}-${{ github.run_number }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: warn

  # ════════════════════════════════════════════════════════════════════
  # BOOTSTRAP
  # ════════════════════════════════════════════════════════════════════

  bootstrap:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'bootstrap'

    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Get week number
        id: week
        run: echo "week=$(date -u +%V)" >> $GITHUB_OUTPUT

      - name: Bootstrap all stock history
        run: python data_updater.py --bootstrap

      - name: Save price cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: price_cache.db
          key: price-cache-${{ runner.os }}-w${{ steps.week.outputs.week }}-bootstrap-${{ github.run_number }}

      - name: Upload cache DB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-cache-${{ github.run_number }}
          path: price_cache.db
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════
  # HEALTHCHECK
  # ════════════════════════════════════════════════════════════════════

  healthcheck:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'healthcheck'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Healthcheck
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scanner.py --healthcheck
