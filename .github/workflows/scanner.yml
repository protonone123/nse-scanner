name: NSE Live Scanner v4.3

on:
  schedule:
    # ── DAILY SCANS (update EOD + full scan) ────────────────────────────────
    # 8:00 AM IST  = 2:30 UTC
    - cron: "30 2 * * 1-5"
    # 12:30 PM IST = 7:00 UTC
    - cron: "0 7 * * 1-5"
    # 4:30 PM IST  = 11:00 UTC
    - cron: "0 11 * * 1-5"

    # ── GAP SCANNER 9:20 AM IST = 3:50 UTC ──────────────────────────────────
    - cron: "50 3 * * 1-5"

    # ── 30-MIN SCANS (update intraday + halfhour scan) ───────────────────────
    - cron: "30 3 * * 1-5"   #  9:00 AM IST
    - cron: "0 4 * * 1-5"    #  9:30 AM IST
    - cron: "30 4 * * 1-5"   # 10:00 AM IST
    - cron: "0 5 * * 1-5"    # 10:30 AM IST
    - cron: "30 5 * * 1-5"   # 11:00 AM IST
    - cron: "0 6 * * 1-5"    # 11:30 AM IST
    - cron: "30 6 * * 1-5"   # 12:00 PM IST
    - cron: "30 7 * * 1-5"   #  1:00 PM IST
    - cron: "0 8 * * 1-5"    #  1:30 PM IST
    - cron: "30 8 * * 1-5"   #  2:00 PM IST
    - cron: "0 9 * * 1-5"    #  2:30 PM IST
    - cron: "30 9 * * 1-5"   #  3:00 PM IST
    - cron: "0 10 * * 1-5"   #  3:30 PM IST

    # ── WEEKLY SCAN Saturday 9:00 AM IST = 3:30 UTC ─────────────────────────
    - cron: "30 3 * * 6"

  workflow_dispatch:
    inputs:
      mode:
        description: "Mode to run"
        required: true
        type: choice
        options:
          - daily
          - halfhour
          - weekly
          - gap
          - test
          - healthcheck
          - bootstrap
          - stats
          - update-daily
          - update-intraday
          - fundamentals

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 100

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get week number
        id: week
        run: echo "week=$(date -u +%V)" >> $GITHUB_OUTPUT

      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: price_cache.db
          key: price-cache-${{ runner.os }}-week${{ steps.week.outputs.week }}
          restore-keys: |
            price-cache-${{ runner.os }}-

      # ── Determine mode ──────────────────────────────────────────────────────
      - name: Set mode
        id: mode
        run: |
          SCHED="${{ github.event.schedule }}"
          INPUT="${{ github.event.inputs.mode }}"

          if [ -n "$INPUT" ]; then
            echo "MODE=$INPUT" >> $GITHUB_OUTPUT

          # Gap scan 9:20 AM IST
          elif [ "$SCHED" = "50 3 * * 1-5" ]; then
            echo "MODE=gap" >> $GITHUB_OUTPUT

          # Saturday weekly scan
          elif [ "$SCHED" = "30 3 * * 6" ]; then
            echo "MODE=weekly" >> $GITHUB_OUTPUT

          # Daily scans: 8AM / 12:30PM / 4:30PM IST
          elif [ "$SCHED" = "30 2 * * 1-5" ] || \
               [ "$SCHED" = "0 7 * * 1-5" ]  || \
               [ "$SCHED" = "0 11 * * 1-5" ]; then
            echo "MODE=daily" >> $GITHUB_OUTPUT

          # All other slots = halfhour
          else
            echo "MODE=halfhour" >> $GITHUB_OUTPUT
          fi

      # ── DAILY: update EOD data → sector indices → bulk deals → scan ─────────
      - name: Daily (full update + scan)
        if: steps.mode.outputs.MODE == 'daily'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PORTFOLIO_VALUE: ${{ secrets.PORTFOLIO_VALUE || '1000000' }}
        run: |
          echo "=== Step 1/4: EOD bars (1d/1wk/1mo) ==="
          python data_updater.py --daily
          echo "=== Step 2/4: Sector indices ==="
          python data_updater.py --sectors
          echo "=== Step 3/4: Full pattern scan ==="
          python scanner.py --daily --telegram
          echo "=== Step 4/4: Track outcomes ==="
          python scanner.py --daily --telegram || true

      # ── HALFHOUR: update 15m/1h → scan ──────────────────────────────────────
      - name: Halfhour (intraday update + scan)
        if: steps.mode.outputs.MODE == 'halfhour'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PORTFOLIO_VALUE: ${{ secrets.PORTFOLIO_VALUE || '1000000' }}
        run: |
          echo "=== Step 1/2: Intraday bars (15m + 1h) ==="
          python data_updater.py --intraday
          echo "=== Step 2/2: Halfhour scan ==="
          python scanner.py --halfhour --telegram

      # ── WEEKLY: Saturday morning deep scan ─────────────────────────────────
      - name: Weekly scan (Saturday — weekly+monthly patterns)
        if: steps.mode.outputs.MODE == 'weekly'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PORTFOLIO_VALUE: ${{ secrets.PORTFOLIO_VALUE || '1000000' }}
        run: |
          echo "=== Weekly+monthly pattern scan ==="
          python scanner.py --weekly --telegram

      # ── GAP SCANNER ──────────────────────────────────────────────────────────
      - name: Gap scanner (9:20 AM IST)
        if: steps.mode.outputs.MODE == 'gap'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python data_updater.py --gap --telegram

      # ── FUNDAMENTALS REFRESH (manual) ────────────────────────────────────────
      - name: Fundamentals refresh
        if: steps.mode.outputs.MODE == 'fundamentals'
        run: |
          python -c "
          from fundamentals import batch_refresh_fundamentals, fetch_nse_bulk_deals
          from data_updater import load_universe
          stocks = load_universe()
          fetch_nse_bulk_deals()
          batch_refresh_fundamentals(stocks[:500], workers=6)
          print('Done')
          "

      # ── STANDALONE MODES ─────────────────────────────────────────────────────
      - name: Test
        if: steps.mode.outputs.MODE == 'test'
        run: |
          python data_updater.py --intraday
          python scanner.py --test

      - name: Healthcheck
        if: steps.mode.outputs.MODE == 'healthcheck'
        run: python scanner.py --healthcheck

      - name: Bootstrap (full one-time download ~65 min)
        if: steps.mode.outputs.MODE == 'bootstrap'
        timeout-minutes: 90
        run: |
          python data_updater.py --bootstrap
          python data_updater.py --stats

      - name: Stats
        if: steps.mode.outputs.MODE == 'stats'
        run: python data_updater.py --stats

      - name: Standalone EOD update
        if: steps.mode.outputs.MODE == 'update-daily'
        run: python data_updater.py --daily

      - name: Standalone intraday update
        if: steps.mode.outputs.MODE == 'update-intraday'
        run: python data_updater.py --intraday

      # ── Save price cache ──────────────────────────────────────────────────────
      - name: Save price cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: price_cache.db
          key: price-cache-${{ runner.os }}-week${{ steps.week.outputs.week }}-${{ github.run_number }}

      # ── Commit watchlist ──────────────────────────────────────────────────────
      - name: Commit watchlist
        if: steps.mode.outputs.MODE == 'daily' || steps.mode.outputs.MODE == 'weekly'
        run: |
          git config user.name "NSE Scanner Bot"
          git config user.email "scanner@noreply.github.com"
          git add watchlist.json || true
          git diff --staged --quiet || git commit -m "watchlist: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.mode.outputs.MODE }}-${{ github.run_number }}
          path: |
            output/
            logs/
            signals.db
            watchlist.json
          retention-days: 30
