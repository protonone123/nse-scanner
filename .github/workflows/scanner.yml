name: NSE Live Scanner v3.5

on:
  schedule:
    # ── DAILY SCANS (full scan) ──────────────────────────────────
    # 8:00 AM IST  = 2:30 UTC
    - cron: "30 2 * * 1-5"
    # 12:30 PM IST = 7:00 UTC
    - cron: "0 7 * * 1-5"
    # 4:30 PM IST  = 11:00 UTC
    - cron: "0 11 * * 1-5"

    # ── 30-MIN SCANS (market hours 9:15 AM – 3:30 PM IST) ────────
    - cron: "45 3 * * 1-5"   # 9:15 AM IST
    - cron: "15 4 * * 1-5"   # 9:45 AM IST
    - cron: "45 4 * * 1-5"   # 10:15 AM IST
    - cron: "15 5 * * 1-5"   # 10:45 AM IST
    - cron: "45 5 * * 1-5"   # 11:15 AM IST
    - cron: "15 6 * * 1-5"   # 11:45 AM IST
    - cron: "45 6 * * 1-5"   # 12:15 PM IST
    - cron: "15 7 * * 1-5"   # 12:45 PM IST
    - cron: "45 7 * * 1-5"   # 1:15 PM IST
    - cron: "15 8 * * 1-5"   # 1:45 PM IST
    - cron: "45 8 * * 1-5"   # 2:15 PM IST
    - cron: "15 9 * * 1-5"   # 2:45 PM IST
    - cron: "45 9 * * 1-5"   # 3:15 PM IST

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        type: choice
        options: [daily, halfhour, test, healthcheck]

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Restore price cache (the key performance improvement) ────
      # Cache key rotates weekly so stale data doesn't accumulate forever.
      # On cache miss (first run or Monday): scanner does full 1y download.
      # On cache hit: scanner only downloads last 7 days per stock.
      - name: Restore price cache
        id: price-cache
        uses: actions/cache@v4
        with:
          path: price_cache.db
          key: price-cache-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-week${{ steps.week.outputs.week }}
          restore-keys: |
            price-cache-${{ runner.os }}-

      - name: Get week number (for cache key rotation)
        id: week
        run: echo "week=$(date -u +%V)" >> $GITHUB_OUTPUT

      # ── Determine mode ────────────────────────────────────────────
      - name: Set mode
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "MODE=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 2 * * 1-5" ] || \
               [ "${{ github.event.schedule }}" = "0 7 * * 1-5" ]  || \
               [ "${{ github.event.schedule }}" = "0 11 * * 1-5" ]; then
            echo "MODE=daily" >> $GITHUB_OUTPUT
          else
            echo "MODE=halfhour" >> $GITHUB_OUTPUT
          fi

      # ── Run scanner ───────────────────────────────────────────────
      - name: Run scanner
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          MODE="${{ steps.mode.outputs.MODE }}"
          FORCE=""
          # Manual dispatch of halfhour: bypass market-hours guard
          if [ "$MODE" = "halfhour" ] && [ -n "${{ github.event.inputs.mode }}" ]; then
            FORCE="--force"
          fi
          python scanner.py --${MODE} --telegram $FORCE

      # ── Save price cache for next run ─────────────────────────────
      # Always save after a successful run so the next run benefits.
      - name: Save price cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: price_cache.db
          key: price-cache-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-week${{ steps.week.outputs.week }}-${{ github.run_number }}

      # ── Commit watchlist.json ─────────────────────────────────────
      - name: Commit watchlist
        if: steps.mode.outputs.MODE == 'daily'
        run: |
          git config user.name  "NSE Scanner Bot"
          git config user.email "scanner@noreply.github.com"
          git add watchlist.json || true
          git diff --staged --quiet || git commit -m "watchlist: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

      # ── Upload artifacts ──────────────────────────────────────────
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.mode.outputs.MODE }}-${{ github.run_number }}
          path: |
            output/
            logs/
            signals.db
            watchlist.json
          retention-days: 30
